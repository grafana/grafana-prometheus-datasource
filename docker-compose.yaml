services:
  # Vanilla upstream Prometheus so the provisioned 'prometheus' datasource
  # actually points at a running server. It scrapes itself and the Grafana dev
  # container, giving real metric names, label names and label values to
  # exercise the plugin against.
  prometheus:
    image: prom/prometheus
    container_name: 'prometheus'
    volumes:
      - ./provisioning/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090/tcp

  # Test-only gzip-forcing reverse proxy in front of Prometheus. The provisioned
  # datasource points at this (http://prometheus-gzip:9091) instead of directly
  # at Prometheus so responses are always gzip-compressed with an explicit
  # Content-Length. That deterministically recreates the framing conditions that
  # produced the externalized-plugin 500s; vanilla Prometheus does not reliably
  # emit this shape, which is exactly why the original bug hid from tests.
  prometheus-gzip:
    image: golang:1.26-alpine
    container_name: 'prometheus-gzip'
    depends_on:
      - prometheus
    working_dir: /app
    volumes:
      - ./tests/gzip-proxy/main.go:/app/main.go:ro
    environment:
      UPSTREAM: http://prometheus:9090
      LISTEN: ':9091'
      GOTOOLCHAIN: local
      GOPROXY: 'off'
    command: ['go', 'run', 'main.go']

  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    depends_on:
      - prometheus
      - prometheus-gzip
    environment:
      # Grafana 13 enables splashScreen by default; the overlay blocks Playwright interactions.
      GF_FEATURE_TOGGLES_splashScreen: 'false'
      # Override the base value now that the plugin ID is 'prometheus'.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: prometheus
      # Enable localization for plugins.
      GF_FEATURE_TOGGLES_localizationForPlugins: 'true'
    configs:
      # Run the externalized plugin in place of the core Prometheus plugin.
      # Without as_external=true, DuplicatePluginIDValidation (pkg/services/pluginsintegration/pipeline/steps.go)
      # drops the external plugin because the core one is already registered under id=prometheus.
      # Env vars won't work here because Grafana only applies GF_PLUGIN_PROMETHEUS_* overrides if
      # [plugin.prometheus] already exists in defaults.ini — and it doesn't.
      - source: grafana_custom_ini
        target: /etc/grafana/grafana.ini

configs:
  grafana_custom_ini:
    content: |
      [plugin.prometheus]
      as_external = true
