name: Changeset check

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-changeset:
    name: Verify changeset
    runs-on: ubuntu-latest
    steps:
      - name: Skip for renovate-sh-app
        id: skip-bot
        if: github.event.pull_request.user.login == 'renovate-sh-app[bot]' || github.event.pull_request.user.login == 'renovate-sh-app'
        run: |
          echo "PR opened by renovate-sh-app, skipping changeset check."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Skip when 'no-changelog' label is present
        id: skip-label
        if: steps.skip-bot.outputs.skip != 'true' && contains(github.event.pull_request.labels.*.name, 'no-changelog')
        run: |
          echo "'no-changelog' label is set, skipping changeset check."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.skip-bot.outputs.skip != 'true' && steps.skip-label.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify a changeset file was added
        if: steps.skip-bot.outputs.skip != 'true' && steps.skip-label.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA"
          merge_base=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          added_files=$(git diff --name-only --diff-filter=A "$merge_base" "$HEAD_SHA" -- '.changeset/*.md' \
            ':(exclude).changeset/README.md')
          if [ -z "$added_files" ]; then
            echo "::error::No changeset file was added in this PR."
            echo ""
            echo "How to fix:"
            echo "  - Add a changeset by following the instructions in scripts/README.md"
            echo "    (https://github.com/${GITHUB_REPOSITORY}/blob/main/scripts/README.md),"
            echo "    typically by running 'yarn changeset' from the repo root."
            echo "  - Or, if a changelog entry is not needed for this PR, add the"
            echo "    'no-changelog' label and this check will pass."
            exit 1
          fi
          echo "Found changeset file(s):"
          echo "$added_files"

      - name: Verify library changesets have datasource mirrors
        if: steps.skip-bot.outputs.skip != 'true' && steps.skip-label.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA"
          merge_base=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          mapfile -t added_files < <(git diff --name-only --diff-filter=A "$merge_base" "$HEAD_SHA" -- \
            '.changeset/*.md' ':(exclude).changeset/README.md')
          node scripts/check-changeset-mirrors.js "${added_files[@]}"

      - name: Verify promlib changesets are patch-only
        if: steps.skip-bot.outputs.skip != 'true' && steps.skip-label.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA"
          merge_base=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          added_files=$(git diff --name-only --diff-filter=A "$merge_base" "$HEAD_SHA" -- '.changeset/*.md' \
            ':(exclude).changeset/README.md')
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if grep -qiE '"[^"]*promlib[^"]*":[[:space:]]*(minor|major)' "$file"; then
              echo "::error::Changeset file '$file' contains a non-patch bump for promlib. Only 'patch' is allowed."
              exit 1
            fi
          done <<< "$added_files"
          echo "All promlib changeset entries are patch-only (or no promlib entries found)."
