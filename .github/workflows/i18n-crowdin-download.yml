name: Crowdin Download Action

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  download-sources-from-crowdin:
    runs-on: ubuntu-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-pr-automation
      - name: 'Get vault secrets'
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@4418cba5ecf0999055129273c9cf199d576b5aea # main
        with:
          # Vault secret paths:
          # - ci/repo/grafana/grafana-prometheus-datasource/grafana-frontend-crowdin-token
          repo_secrets: |
            CROWDIN_TOKEN=grafana-frontend-crowdin-token:access_token
      - name: Download from Crowdin
        uses: grafana/grafana-github-actions/crowdin-download@3cfd8aa18530171681eca2a3eb542721b8413418 # main
        with:
          crowdin_token: ${{ fromJSON(steps.vault-secrets.outputs.secrets).CROWDIN_TOKEN }}
          crowdin_project_id: 54
          pr_labels: 'area/i18n, no-changelog'
          github_repo_token: ${{ steps.get-github-app-token.outputs.token }}
