name: Publish @grafana/prometheus to NPM

permissions: {}

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    name: Publish @grafana/prometheus
    runs-on: github-hosted-ubuntu-x64-small
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Verify branch is main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::This workflow can only be run on the main branch. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Verify caller is a repo admin
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission')
          if [[ "$PERMISSION" != "admin" ]]; then
            echo "::error::Only repository admins can run this workflow. Your permission level: ${PERMISSION}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check version is newer than npm
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version_check
        with:
          file-name: packages/grafana-prometheus/package.json
          file-url: https://cdn.jsdelivr.net/npm/@grafana/prometheus/package.json
          static-checking: localIsNew

      - name: Abort if version not newer
        if: steps.version_check.outputs.changed != 'true'
        run: |
          echo "::error::Local version is not newer than npm. Bump the version in packages/grafana-prometheus/package.json first."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false # Disable cache!

      # Trusted Publishing is only available in npm v11.5.1 and later
      - name: Update npm
        run: npm install -g npm@11.15.0

      - name: Configure npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build library
        run: yarn workspace @grafana/prometheus build

      - name: Determine npm tag
        id: npm_tag
        env:
          VERSION: ${{ steps.version_check.outputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: inputs.dry-run != true
        working-directory: packages/grafana-prometheus
        env:
          NPM_TAG: ${{ steps.npm_tag.outputs.tag }}
        run: npm publish --access public --tag "$NPM_TAG"

      - name: Dry run summary
        if: inputs.dry-run == true
        env:
          VERSION: ${{ steps.version_check.outputs.version }}
          TAG: ${{ steps.npm_tag.outputs.tag }}
        run: |
          echo "## Dry run complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Would publish @grafana/prometheus@${VERSION} with tag ${TAG}" >> "$GITHUB_STEP_SUMMARY"
