name: Publish @grafana/prometheus to NPM

permissions: {}

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

# Prevent overlapping publish runs from racing on the same package version.
concurrency:
  group: npm-publish-grafana-prometheus
  cancel-in-progress: false

jobs:
  # GitHub already requires write access to dispatch or re-run this workflow, so
  # this job is a fast-fail UX/branch gate, not the security boundary. The real
  # publishing control is enforced on the `publish` job's `npm-publish`
  # environment (required reviewers + main-only deployment branch policy),
  # because that is where the OIDC publishing token lives.
  check-permissions:
    name: Verify caller has write access
    runs-on: github-hosted-ubuntu-x64-small
    permissions:
      contents: read
    steps:
      - name: Verify branch is main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::This workflow can only be run on the main branch. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Check GitHub permission level
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          REPO: ${{ github.repository }}
        run: |
          check_permission() {
            local actor="$1"
            local permission
            permission=$(gh api "repos/${REPO}/collaborators/${actor}/permission" --jq '.permission')

            if [[ "$permission" != "admin" && "$permission" != "write" ]]; then
              echo "::error::Only repository admins or users with write access can run this workflow. ${actor}'s permission level: ${permission}"
              exit 1
            fi
          }

          check_permission "$ACTOR"
          # Only covers full-workflow reruns: re-running just the failed publish
          # job skips this job entirely, so triggering_actor is not re-checked
          # here. That path is covered by GitHub's write requirement for reruns
          # and the npm-publish environment protections.
          if [[ "$TRIGGERING_ACTOR" != "$ACTOR" ]]; then
            check_permission "$TRIGGERING_ACTOR"
          fi

  build:
    name: Build @grafana/prometheus
    needs: check-permissions
    runs-on: github-hosted-ubuntu-x64-small
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version_check.outputs.version }}
      changed: ${{ steps.version_check.outputs.changed }}
      tag: ${{ steps.npm_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check version is newer than npm
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version_check
        with:
          file-name: packages/grafana-prometheus/package.json
          file-url: https://cdn.jsdelivr.net/npm/@grafana/prometheus/package.json
          static-checking: localIsNew

      - name: Abort if version not newer
        if: steps.version_check.outputs.changed != 'true'
        run: |
          echo "::error::Local version is not newer than npm. Bump the version in packages/grafana-prometheus/package.json first."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false # Disable cache!

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build library
        run: yarn workspace @grafana/prometheus build

      - name: Determine npm tag
        id: npm_tag
        env:
          VERSION: ${{ steps.version_check.outputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack tarball
        working-directory: packages/grafana-prometheus
        run: npm pack --pack-destination "${RUNNER_TEMP}/pkg"

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-package
          path: ${{ runner.temp }}/pkg/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish @grafana/prometheus
    needs: build
    if: needs.build.outputs.changed == 'true' && inputs['dry-run'] != true
    runs-on: github-hosted-ubuntu-x64-small
    # Security boundary: this environment holds the OIDC publishing rights, so
    # access control is enforced here via required reviewers and a main-only
    # deployment branch policy (configured in repo settings). These protections
    # also apply when only this job is re-run, which the check-permissions job
    # does not cover.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      # Trusted Publishing is only available in npm v11.5.1 and later
      - name: Update npm
        run: npm install -g npm@11.15.0

      - name: Download package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-package
          path: pkg

      - name: Publish to NPM
        env:
          NPM_TAG: ${{ needs.build.outputs.tag }}
        run: npm publish pkg/*.tgz --access public --tag "$NPM_TAG"

  dry-run-summary:
    name: Dry run summary
    needs: build
    if: needs.build.outputs.changed == 'true' && inputs['dry-run'] == true
    runs-on: github-hosted-ubuntu-x64-small
    permissions: {}
    steps:
      - name: Summarize dry run
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          echo "## Dry run complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Would publish @grafana/prometheus@${VERSION} with tag ${TAG}" >> "$GITHUB_STEP_SUMMARY"
