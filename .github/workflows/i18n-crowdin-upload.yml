name: Crowdin Upload Action

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/grafana-prometheus/src/locales/en-US/grafana-prometheus.json'
    branches:
      - main

jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: 'Get vault secrets'
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@4418cba5ecf0999055129273c9cf199d576b5aea # main
        with:
          # Vault secret paths:
          # - ci/repo/grafana/grafana-prometheus-datasource/grafana-frontend-crowdin-token
          repo_secrets: |
            CROWDIN_TOKEN=grafana-frontend-crowdin-token:access_token
      - name: Upload to Crowdin
        uses: grafana/grafana-github-actions/crowdin-upload@3cfd8aa18530171681eca2a3eb542721b8413418 # main
        with:
          crowdin_token: ${{ fromJSON(steps.vault-secrets.outputs.secrets).CROWDIN_TOKEN }}
          crowdin_project_id: 54
